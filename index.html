<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego del Impostor</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>🎭 Juego del Impostor</h1>
        
        <!-- Pantalla de configuración -->
        <div id="setupScreen" class="screen active">
            <h2>Configurar Jugadores</h2>
            
            <div class="form-group">
                <label for="playerName">Nombre del jugador:</label>
                <input type="text" id="playerName" placeholder="Ingresa un nombre">
            </div>
            
            <button class="btn btn-success" onclick="addPlayer()">Agregar Jugador</button>
            
            <h3>Jugadores agregados:</h3>
            <div class="player-list" id="playerList">
                <p style="text-align: center; color: #666;">No hay jugadores agregados</p>
            </div>
            
            <h3>Selecciona una categoría:</h3>
            <div class="category-options" id="categoryOptions"></div>
            
            <div class="form-group">
                <label for="impostorCount">Número de impostores:</label>
                <select id="impostorCount">
                    <option value="1">1 impostor</option>
                    <option value="2">2 impostores</option>
                </select>
            </div>
            
            <button class="btn" onclick="startGame()">Iniciar Juego</button>
        </div>
        
        <!-- Pantalla de palabras -->
        <div id="wordScreen" class="screen">
            <h2 id="currentPlayerName">Turno de: Jugador</h2>
            
            <div id="hiddenMessage" class="hidden-message">
                <p>Pasa el dispositivo a este jugador</p>
                <button class="btn" onclick="revealWord()">Ver mi palabra</button>
            </div>
            
            <div id="wordDisplay" class="player-word" style="display: none;">
                <div class="player-name" id="displayPlayerName">Jugador</div>
                <div class="word" id="wordText">PALABRA</div>
                <div id="impostorIndicator"></div>
            </div>
            
            <button id="nextPlayerBtn" class="btn" style="display: none;" onclick="showNextPlayerWord()">Siguiente Jugador</button>
            <button id="finishWordsBtn" class="btn btn-success" style="display: none;" onclick="showOrderScreen()">Continuar al Juego</button>
        </div>
        
        <!-- Pantalla de orden -->
        <div id="orderScreen" class="screen">
            <h2>Orden de Participación</h2>
            <p>Los jugadores hablarán en el siguiente orden:</p>
            
            <div class="order-list" id="orderList"></div>
            
            <div style="margin-top: 20px;">
                <button class="btn" onclick="revealSecrets()">Revelar Secretos</button>
                <button class="btn btn-danger" onclick="resetGame()">Nuevo Juego</button>
            </div>
        </div>
    </div>

    <!-- Scripts modulares -->
    <script src="js/data.js"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
